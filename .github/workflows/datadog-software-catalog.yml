name: Datadog Software Catalog

on:
  pull_request:
    paths:
      - docker/service.datadog.yaml
      - docker/src/docker-compose.yml
      - scripts/catalog-tools/**
      - .github/workflows/datadog-software-catalog.yml
  push:
    branches:
      - main
    paths:
      - docker/service.datadog.yaml
      - docker/src/docker-compose.yml
      - scripts/catalog-tools/**
      - .github/workflows/datadog-software-catalog.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate catalog definition
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/catalog-tools/package-lock.json

      - name: Install catalog tools
        run: npm ci --prefix scripts/catalog-tools

      - name: Validate service definition
        run: node scripts/catalog-tools/validate.mjs docker/service.datadog.yaml docker/src/docker-compose.yml

  publish:
    name: Publish catalog definition
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'

    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: ${{ vars.DD_SITE || 'datadoghq.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/catalog-tools/package-lock.json

      - name: Install catalog tools
        run: npm ci --prefix scripts/catalog-tools

      - name: Check Datadog credentials
        run: |
          if [ -z "${DD_API_KEY}" ] || [ -z "${DD_APP_KEY}" ]; then
            echo "::error::Set DD_API_KEY and DD_APP_KEY as GitHub repository secrets."
            exit 1
          fi

      - name: Publish to Datadog Software Catalog
        run: node scripts/catalog-tools/publish.mjs docker/service.datadog.yaml
