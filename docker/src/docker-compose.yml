services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-task-api
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DD_AGENT_HOST: host.docker.internal
      DD_SERVICE: nestjs-task-api
      DD_ENV: dev
      DD_VERSION: 1.0.0
      DD_LOGS_INJECTION: "true"

  load-generator:
    image: node:26-slim
    profiles:
      - load
    depends_on:
      - api
    working_dir: /load
    volumes:
      - ./load-generator.js:/load/load-generator.js:ro
    environment:
      TARGET_URL: http://api:3000
      CONCURRENCY: ${LOAD_CONCURRENCY:-4}
      REQUEST_DELAY_MS: ${LOAD_REQUEST_DELAY_MS:-250}
      RUN_SECONDS: ${LOAD_RUN_SECONDS:-0}
      DD_INSTRUMENT_SERVICE_WITH_APM: "false"
    command: ["node", "load-generator.js"]
